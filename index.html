<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Mobile height fix for browser address bars */
        .app-container { min-height: 100dvh; }
        
        /* Prevent layout shift on load */
        [v-cloak] { display: none; }
        
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; align-items: center; justify-content: center;
            z-index: 9999; font-family: sans-serif;
        }
        .dark #loading { background: #0f172a; color: white; }

        pre { overflow-x: auto; background: #f1f5f9; padding: 1rem; border-radius: 0.5rem; margin: 0.5rem 0; }
        .dark pre { background: #1e293b; color: #e2e8f0; }
        code { font-family: monospace; }
        
        .message-bubble { max-width: 85%; word-wrap: break-word; }
        
        /* Sidebar Transition */
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 50; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">

    <div id="loading">Initialising AI Interface...</div>

    <div id="app" class="app-container flex flex-col md:flex-row relative opacity-0 transition-opacity duration-300">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform -translate-x-full md:translate-x-0 md:static flex flex-col">
            <div class="p-4 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
                <h1 class="font-bold text-xl tracking-tight text-blue-600 dark:text-blue-400">Gemini Clone</h1>
                <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="p-4">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 py-3 rounded-xl font-medium hover:bg-blue-100 dark:hover:bg-blue-900/50 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
                    New Chat
                </button>
            </div>

            <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1">
                <!-- Chat history items injected here -->
            </div>

            <div class="p-4 border-t border-slate-100 dark:border-slate-800 space-y-2">
                <button onclick="toggleDarkMode()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span>Appearance</span>
                </button>
                <button onclick="openSettings()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-sm transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <!-- Overlay for mobile sidebar -->
        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <!-- Main Chat Area -->
        <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-slate-950 relative">
            <!-- Header -->
            <header class="h-16 flex items-center justify-between px-4 border-b border-slate-100 dark:border-slate-800 sticky top-0 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md z-30">
                <button onclick="toggleSidebar()" class="md:hidden p-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div id="current-chat-title" class="font-medium truncate max-w-[200px]">New Chat</div>
                <div class="w-10"></div> <!-- Spacer -->
            </header>

            <!-- Messages Container -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32">
                <!-- Welcome state -->
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center space-y-4 py-12">
                    <div class="text-4xl">✨</div>
                    <h2 class="text-2xl font-semibold">How can I help you today?</h2>
                    <p class="text-slate-500 max-w-sm">Enter your OpenRouter API key in settings to start chatting.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="fixed bottom-0 left-0 right-0 md:left-72 bg-gradient-to-t from-white dark:from-slate-950 via-white dark:via-slate-950 to-transparent pt-10 pb-6 px-4">
                <div class="max-w-3xl mx-auto relative">
                    <textarea 
                        id="user-input"
                        rows="1"
                        placeholder="Message AI..."
                        class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-2xl py-4 pl-5 pr-14 focus:ring-2 focus:ring-blue-500 resize-none max-h-48 overflow-y-auto shadow-sm"
                        oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"
                    ></textarea>
                    <button id="send-btn" onclick="sendMessage()" class="absolute right-3 bottom-3 p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                    </button>
                </div>
                <p class="text-[10px] text-center mt-2 text-slate-400">AI can make mistakes. Check important info.</p>
            </div>
        </main>

        <!-- Settings Modal -->
        <div id="settings-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
            <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeSettings()"></div>
            <div class="relative bg-white dark:bg-slate-900 w-full max-w-md rounded-2xl shadow-2xl p-6 space-y-6">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-bold">Settings</h3>
                    <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-600">✕</button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                        <input type="password" id="api-key-input" class="w-full bg-slate-100 dark:bg-slate-800 rounded-lg p-3 outline-none border border-transparent focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Model ID</label>
                        <input type="text" id="model-input" placeholder="deepseek/deepseek-r1:free" class="w-full bg-slate-100 dark:bg-slate-800 rounded-lg p-3 outline-none border border-transparent focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">System Prompt</label>
                        <textarea id="system-prompt-input" rows="3" class="w-full bg-slate-100 dark:bg-slate-800 rounded-lg p-3 outline-none border border-transparent focus:border-blue-500"></textarea>
                    </div>
                </div>

                <button onclick="saveSettings()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT SECTION -->
    <script>
        // --- State Management ---
        let state = {
            apiKey: localStorage.getItem('api_key') || '',
            model: localStorage.getItem('model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('system_prompt') || 'You are a helpful, concise AI assistant.',
            chats: JSON.parse(localStorage.getItem('chats')) || [],
            currentChatId: null,
            isStreaming: false,
            darkMode: localStorage.getItem('theme') === 'dark'
        };

        // --- Selectors ---
        const ui = {
            app: document.getElementById('app'),
            loader: document.getElementById('loading'),
            msgContainer: document.getElementById('messages-container'),
            chatList: document.getElementById('chat-list'),
            userInput: document.getElementById('user-input'),
            settingsModal: document.getElementById('settings-modal'),
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            chatTitle: document.getElementById('current-chat-title')
        };

        // --- Initialization ---
        function init() {
            applyTheme();
            renderChatList();
            
            // Auto-select last chat or create one
            if (state.chats.length > 0) {
                switchChat(state.chats[0].id);
            } else {
                createNewChat();
            }

            // UI Readiness
            ui.loader.style.display = 'none';
            ui.app.classList.remove('opacity-0');
            
            // Enter key handler
            ui.userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        // --- Theme ---
        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            localStorage.setItem('theme', state.darkMode ? 'dark' : 'light');
            applyTheme();
        }

        function applyTheme() {
            if (state.darkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        // --- Sidebar ---
        function toggleSidebar() {
            const isHidden = ui.sidebar.classList.contains('-translate-x-full');
            if (isHidden) {
                ui.sidebar.classList.remove('-translate-x-full');
                ui.overlay.classList.remove('hidden');
            } else {
                ui.sidebar.classList.add('-translate-x-full');
                ui.overlay.classList.add('hidden');
            }
        }

        // --- Chat Management ---
        function createNewChat() {
            const id = Date.now().toString();
            const newChat = {
                id,
                title: 'New Chat',
                messages: []
            };
            state.chats.unshift(newChat);
            saveToStorage();
            renderChatList();
            switchChat(id);
            if (window.innerWidth < 768) toggleSidebar();
        }

        function switchChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            ui.chatTitle.innerText = chat.title;
            renderMessages();
            renderChatList();
        }

        function deleteChat(id, e) {
            e.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) {
                state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
            }
            if (!state.currentChatId) createNewChat();
            else {
                saveToStorage();
                renderChatList();
                switchChat(state.currentChatId);
            }
        }

        function saveToStorage() {
            localStorage.setItem('chats', JSON.stringify(state.chats));
        }

        // --- Rendering ---
        function renderChatList() {
            ui.chatList.innerHTML = state.chats.map(chat => `
                <div onclick="switchChat('${chat.id}')" class="group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all ${state.currentChatId === chat.id ? 'bg-slate-100 dark:bg-slate-800' : 'hover:bg-slate-50 dark:hover:bg-slate-900/50'}">
                    <div class="flex items-center gap-3 truncate">
                        <svg class="w-4 h-4 shrink-0 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                        <span class="text-sm truncate">${chat.title}</span>
                    </div>
                    <button onclick="deleteChat('${chat.id}', event)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition-opacity">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `).join('');
        }

        function renderMessages() {
            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (!chat || chat.messages.length === 0) {
                ui.msgContainer.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-center space-y-4 py-12">
                        <div class="text-4xl">✨</div>
                        <h2 class="text-2xl font-semibold">How can I help you today?</h2>
                    </div>`;
                return;
            }

            ui.msgContainer.innerHTML = chat.messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start animate-fade-in'}">
                    <div class="message-bubble ${m.role === 'user' ? 'bg-blue-600 text-white rounded-2xl rounded-tr-none p-4 shadow-sm' : 'bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-200 rounded-2xl rounded-tl-none p-4'}">
                        <div class="prose dark:prose-invert max-w-none text-sm leading-relaxed">
                            ${m.role === 'assistant' ? marked.parse(m.content) : escapeHtml(m.content)}
                        </div>
                    </div>
                </div>
            `).join('') + '<div id="anchor"></div>';
            
            ui.msgContainer.scrollTo({ top: ui.msgContainer.scrollHeight, behavior: 'smooth' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // --- Settings ---
        function openSettings() {
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            document.getElementById('system-prompt-input').value = state.systemPrompt;
            ui.settingsModal.classList.remove('hidden');
            ui.settingsModal.classList.add('flex');
        }

        function closeSettings() {
            ui.settingsModal.classList.add('hidden');
            ui.settingsModal.classList.remove('flex');
        }

        function saveSettings() {
            state.apiKey = document.getElementById('api-key-input').value;
            state.model = document.getElementById('model-input').value || 'deepseek/deepseek-r1:free';
            state.systemPrompt = document.getElementById('system-prompt-input').value;
            
            localStorage.setItem('api_key', state.apiKey);
            localStorage.setItem('model', state.model);
            localStorage.setItem('system_prompt', state.systemPrompt);
            
            closeSettings();
            alert('Settings saved!');
        }

        // --- API & Streaming ---
        async function sendMessage() {
            const text = ui.userInput.value.trim();
            if (!text || state.isStreaming) return;

            if (!state.apiKey) {
                alert('Please set your OpenRouter API Key in Settings first.');
                openSettings();
                return;
            }

            // 1. Update State
            const chat = state.chats.find(c => c.id === state.currentChatId);
            chat.messages.push({ role: 'user', content: text });
            
            // Update title if first message
            if (chat.title === 'New Chat') {
                chat.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
            }

            ui.userInput.value = '';
            ui.userInput.style.height = 'auto';
            renderMessages();
            renderChatList();

            // 2. Prepare for Stream
            state.isStreaming = true;
            document.getElementById('send-btn').disabled = true;

            const assistantMsg = { role: 'assistant', content: '' };
            chat.messages.push(assistantMsg);
            
            // Add a placeholder bubble for streaming
            const streamId = 'streaming-' + Date.now();
            const streamHtml = `
                <div id="${streamId}" class="flex justify-start">
                    <div class="message-bubble bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-200 rounded-2xl rounded-tl-none p-4 shadow-sm">
                        <div class="prose dark:prose-invert max-w-none text-sm" id="${streamId}-content">
                            <span class="animate-pulse">● ● ●</span>
                        </div>
                    </div>
                </div>`;
            
            const anchor = document.getElementById('anchor');
            if (anchor) {
                anchor.insertAdjacentHTML('beforebegin',
